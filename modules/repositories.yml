# yaml-language-server: $schema=https://schema.blue-build.org/module-v1.json
type: rpm-ostree
install:
  # We use a static mirror (RIT) to avoid the DNS redirector failure
  - https://mirrors.rit.edu/rpmfusion/free/fedora/rpmfusion-free-release-44.noarch.rpm
  - https://mirrors.rit.edu/rpmfusion/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm
  
  # https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-44.noarch.rpm
  # https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-44.noarch.rpm
repos:
  # Use 'repos' for these because they ARE .repo text files
  - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
  - https://download.docker.com/linux/fedora/docker-ce.repo

