# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: wolf-os
description: A declarative, high-performance Nix-style Fedora Atomic workstation.
base-image: quay.io/fedora/fedora-silverblue
image-version: 44

modules:
  # 1. Register the repositories
  - from-file: ../modules/repositories.yml

  # 2. Install the software
  - from-file: ../modules/packages.yml
  
  # 3. 
  - type: files
    files:
      - source: usr/etc/containers/policy.json
        destination: /usr/etc/containers/policy.json
      - source: usr/etc/pki/containers/wolf-os.pub
        destination: /usr/etc/pki/containers/wolf-os.pub
      # THE KEY TO THE SIGNATURE
      - source: usr/etc/containers/registries.d/wolf-os.yaml
        destination: /usr/etc/containers/registries.d/wolf-os.yaml
      # This overlays custom.xml themes into the system root
      - source: usr/share/gtksourceview-5/styles
        destination: /usr/share/gtksourceview-5/styles
      # Remove gnome-text-editor flatpak on boot (using custom rpm)
      - source: usr/libexec/wolf-os-firstboot.sh
        destination: /usr/libexec/wolf-os-firstboot.sh
      - source: usr/lib/systemd/system/wolf-os-cleanup.service
        destination: /usr/lib/systemd/system/wolf-os-cleanup.service
        


  # 4. Run the assembly script
  - type: script
    scripts:
      - setup-wolf-os.sh
      

# Triggering first signed generation
