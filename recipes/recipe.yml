name: wolf-os
description: A declarative, high-performance Nix-style Fedora Atomic workstation.
base-image: quay.io/fedora/fedora-silverblue
image-version: 44

modules:
  # MISSION 1: Enable RPM Fusion correctly (Bazzite Style)
  - type: akmods
    install:
      - common # This installs the RPM Fusion repo keys and refreshes metadata

  # MISSION 2: Install your optimized package stack
  - type: rpm-ostree
    install:
      - distrobox
      - gparted
      - pluma
      - vlc
      - clinfo
      # Now that RPM Fusion is active, this package will be found
      - mesa-va-drivers-freeworld 
      - libvirt-daemon-config-network
      - libvirt-daemon-kvm
      - qemu-kvm
      - virt-install
      - virt-manager
      - virt-viewer
      - libnsl
      - libxcrypt-compat
      - nss-tools
      - xterm
      - libXaw
      - libutempter
      - mkfontscale
      - xorg-x11-fonts-misc
      - libxkbcommon-x11
      - wget2

  # MISSION 3: Assembly Surgery
  - type: script
    scripts:
      - setup-wolf-os.sh

